spring.application.name=SkillExchangePlatform
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Database connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret Key
jwt.secret=${JWT_SECRET:replace-with-a-very-strong-secret-key-at-least-32-characters}
jwt.expiration=86400000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Port number
server.port=8000

# Frontend redirect URL used by OAuth2 success handler
app.frontend-url=${FRONTEND_URL:http://localhost:3000}